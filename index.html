@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap');

:root{
  /* Cores de marca ILC — IDÊNTICAS nos dois temas, nunca alteradas por tema/filtro */
  --cyan:#00ABD2; --cyan-d:#0090b3; --yellow:#FFD200; --green:#3a9d24; --green-d:#2E8B12;
  --graphite:#34343A; --graphite-2:#26262b; --ink:#1b1b20;

  --bg:#0e0f13; --panel:#16181f; --panel-2:#1c1f28; --line:#2a2e3a;
  --txt:#e9edf4; --muted:#8b93a6; --muted-2:#5d6577;
  --field-bg:#0f1117; --option-bg:#16181f; --scroll-thumb:#2c3140; --scroll-thumb-h:#3a4154;
  --fx-cyan:.20; --fx-yellow:.10; --fx-grid:.5;
  --shadow:0 10px 40px -12px rgba(0,0,0,.65);
}

/* ===== TEMA CLARO ===== (fundo branco, textos escuros, alto contraste) */
:root[data-theme="light"]{
  --bg:#f4f6fa; --panel:#ffffff; --panel-2:#f0f3f8; --line:#dde3ec;
  --txt:#1b1b20; --muted:#5d6577; --muted-2:#8b93a6;
  --field-bg:#ffffff; --option-bg:#ffffff; --scroll-thumb:#c4ccd8; --scroll-thumb-h:#a8b2c2;
  --fx-cyan:.10; --fx-yellow:.06; --fx-grid:.28;

}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--txt);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  transition:background-color .35s ease, color .35s ease;
}
/* Transição suave de tema nos principais blocos visuais */
.topbar,.panel,.kpi,.filters,.modal,.modal-head,.modal-foot,.toast,
.tb-chip,.btn-ghost,.btn-line,.icon-btn,thead th,.f-group input,
.fld input,.fld select,.fld textarea,.filters select,.filters input,
.search-box input,.rank-track,.rank-row .pos,.table-wrap{
  transition:background-color .35s ease, color .35s ease, border-color .35s ease;
}

/* ===== Proteção do logo ILC =====
   Garante as cores ORIGINAIS do logo em login, topbar e dashboard,
   sem inversão/descoloração/transparência por filtros ou modo escuro. */
.login-logo,.tb-logo,img[alt="ILC"],img[alt="ILC Integrator Logistics Company"]{
  filter:none !important;
  -webkit-filter:none !important;
  opacity:1 !important;
  mix-blend-mode:normal !important;
}
.login-logo{filter:drop-shadow(0 6px 18px rgba(0,0,0,.5)) !important}
:root[data-theme="light"] .login-logo{filter:drop-shadow(0 6px 18px rgba(40,55,80,.22)) !important}
::selection{background:var(--cyan);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-h)}

/* ===== Atmospheric background ===== */
.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-fx::before{content:'';position:absolute;width:760px;height:760px;left:-220px;top:-260px;
  background:radial-gradient(circle at 50% 50%,rgba(0,171,210,var(--fx-cyan)),transparent 62%);filter:blur(20px)}
.bg-fx::after{content:'';position:absolute;width:680px;height:680px;right:-220px;bottom:-220px;
  background:radial-gradient(circle at 50% 50%,rgba(255,210,0,var(--fx-yellow)),transparent 62%);filter:blur(24px)}
.grid-fx{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:var(--fx-grid);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(ellipse 80% 70% at 50% 0%,#000 35%,transparent 78%);
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 0%,#000 35%,transparent 78%)}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;

:root[data-theme="light"] #login{background:radial-gradient(ellipse 120% 90% at 50% -10%,#ffffff 0%,#e8edf5 60%)}
#login.hide{opacity:0;visibility:hidden;pointer-events:none}
.login-card{position:relative;width:min(420px,92vw);background:linear-gradient(180deg,rgba(28,31,40,.92),rgba(18,20,27,.96));

  animation:rise .7s cubic-bezier(.2,.8,.2,1) both}
:root[data-theme="light"] .login-card{background:linear-gradient(180deg,#ffffff,#f5f8fc)}
.login-card::before{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;
  background:linear-gradient(135deg,var(--cyan),transparent 40%,transparent 60%,var(--yellow));

  -webkit-mask-composite:xor;mask-composite:exclude;opacity:.5;pointer-events:none}
.login-logo{display:block;width:200px;margin:0 auto 6px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}
.login-sub{text-align:center;color:var(--muted);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:30px;font-weight:500}
.login-sub b{color:var(--cyan);font-weight:600}
.f-group{margin-bottom:16px}

  font-family:inherit;font-size:14.5px;transition:.2s}
.f-group input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,171,210,.16)}
.btn-login{width:100%;margin-top:10px;padding:14px;border:none;border-radius:11px;cursor:pointer;

.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(0,171,210,.8)}
.btn-login:active{transform:translateY(0)}
.login-hint{text-align:center;color:var(--muted-2);font-size:11px;margin-top:18px}
.login-quad{display:flex;justify-content:center;gap:6px;margin-bottom:22px}
.login-quad span{width:8px;height:8px;border-radius:2px}
@keyframes rise{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}

/* ===== APP SHELL ===== */
#app{position:relative;z-index:1;min-height:100vh;display:none}
#app.show{display:block;animation:fade .6s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}

.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;

:root[data-theme="light"] .topbar{background:rgba(255,255,255,.85)}
