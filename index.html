<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILC - Acompanhamento de Frete Morto 2026</title>
    <style>
        /* Estilização Base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            border-bottom: 2px solid #eeeded;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .info-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 5px solid #0056b3;
        }
        /* Formulário de Lançamento */
        .form-panel {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #495057;
        }
        .form-group input, .form-group select {
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-family: inherit;
        }
        .btn-submit {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 9px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #004085;
        }
        /* KPIs */
        .kpi-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: #0056b3;
            color: white;
            padding: 15px;
            border-radius: 6px;
            flex: 1;
            min-width: 150px;
        }
        .kpi-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; opacity: 0.9; }
        .kpi-card p { margin: 5px 0 0 0; font-size: 22px; font-weight: bold; }
        /* Tabela Resumo */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }
        th {
            background-color: #0056b3;
            color: white;
